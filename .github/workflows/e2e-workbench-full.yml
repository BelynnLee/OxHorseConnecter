name: Workbench Full E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *'

concurrency:
  group: workbench-full-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-e2e:
    name: Full Workbench E2E
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run full Workbench checks
        run: pnpm run ci:full

      - name: Upload E2E debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workbench-full-e2e-debug-artifacts
          if-no-files-found: ignore
          path: |
            data/workbench-e2e-*.log
            data/workbench-e2e-projects/**
            test-results/**
            playwright-report/**
