# Common proxy headers for the Remote Agent Console.
# Save to /etc/nginx/snippets/rac-proxy.conf and include via `include /etc/nginx/snippets/rac-proxy.conf;`
# Host must run with TRUST_PROXY=true to honor these headers.

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_redirect off;
